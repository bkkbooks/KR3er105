body:
  text: 卷下世間病之殺人者十三而醫藥殺人者十七皆由不知陰陽虛之前之理也如勞瘵未必適死也欲退其蒸頻用寒涼則脾泄而不可救矣膈噎未必適死也欲開其頻進香燥則三陽結而津液竭矣水腫未必適死也欲利其水頻用淡滲則陰亡而成陽水矣如此之類未易枚舉操司命之權者豈可不知中病即止之理陽虛而見陰熱之證此是真火無根而脫出陰虛而見陽熱之證此陰虛陽無所附而然也陽盛而見陰寒之證陽盛拒陰也陰盛而見陽熱之證陰盛格陽也四者用藥差訛死生反掌按陰陽盛衰之理明則寒熱虛實之證自能瞭然無誤陽虛陰必走水無氣以鼓之不能周流扦環是以走也故有陽虛失血者然血本水類水就下既無氣運之上行則當從二陰之窮脫出今陽虛之血往往見為吐衄者何也要知命門火衰之人真陽脫出浮遊於上陰血擾亂不安亦從而脫出也海藏云激而為吐血衄血者有之心肺受邪也其言可想陰陽格拒藥用反佐謂之反治可也至於真寒而見假熱真熱而見假寒藥用反佐其實正治也自脫益氣是陰虛陽無所附故不得不先補其陽然後徐調其陰此從權之治尋常陰虛勞瘵不得以之藉口而以參耆為家常茶飯熱則生風雖有虛實之不同然皆為假象也只是古方養血清熱之中而以風藥為佐此不可不深推其義夫風者肝木之氣少陽之火焉喜條達而惡抑遏也佐以風藥以辛利之而復其性耳黃連苦參久服而反熱附子乾薑多飲而反寒雖云久而增氣反招見化之尤窟不外寒之不寒是無水也熱之不熱是無火也痙證在外陽病者仰而不免在內陰病者免而不仰此不易之論也而海藏附子散方云下治傷寒陰痙手足厥冷筋脈拘急汗出不止頭項強真頭搖口噤夫頭項強直則非俯而不能仰也奈何陰病亦然意者陰盛格陽於外陽經熱盛故如此如厥陰經熱深厥亦深亦舌捲縮此又是熱乘其本而陰氣反走於外也豫會見頭強直之證有與寒涼而隨斃者蓋未達此理故耳腎者胃之關從陽則開從陰則闔陽太勝則開而為消陽太勝則闔而為水明矣促景治水腫主之以腎氣丸而治消渴亦然安不與陽盛有乖乎豫謂此之消是腎中陽虛不能收攝也此之渴是腎虛引水自救也喻嘉言謂腎水下趨故消腎氣不上勝故渴均用此丸蒸動腎氣恐未必然上虛固是陽虛以身半以上同天之陽也下虛多是陰虛以身半以下同地之陰也然一陽根於地下而水出自高原陽虛則有降無升或虛之極而真陽脫出陰虛則有升無降或虛之極而真陰四射又不可不進求焉陽中不可無陰者何無陰則不能降也陰中不可無陽者何無陽則不能升也故曰天以陽生陰長地以陽殺陰藏渴而汗出小便利大便鞭似不宜更利小便重傷津液也然仲景又有宜五苓散者此蓋通因通用其小便利乃是熱邪偏於小腸行乘勢利導之法如下利之用承氣也燥與濕不兩立之勢然濕則熱熱則燥生有不得不然之理亦濕位之下風氣承之風生燥也仲景諸黃豬黃豬膏法發前輩煎茵陳五令散分治氣血分之燥旨哉截疲劫嗽本非王道亦有不能不用之病如邪已去八九胸中有痰癖留戀其邪斯時不暇顧其餘而真攻其痰則邪無留戀之處而病自愈設邪氣方張則驅邪之未遑敢用截藥乎咳嗽邪已去八九而肺氣虛耗虛則氣逆斯時亦不暇顧虛其邪之未散土而直收澀之收以止逆澀以固脫則正氣復而餘邪自解設邪未去八九而虛邪逆上敢用劫藥乎從少從多觀其事也傷寒黃連湯因其人本虛寒陽邪傳裡與胸中之陽兩陽相合故為上熱下焦之寒則自若也所以上熱下寒斯時已成乖否之象病可愈乎是湯之不可緩矣六氣相合有差多差少有真象有假象真假之中又復有差多差少所以不可不知從治之法也陽虛易於受寒陰虛易於受寒陰虛易於受熱以身中之不足感召外邪之有餘此流濕就燥之義且無以御之之故也然亦有陰虛中寒陽虛受熱者其邪蓋因虛而招致不必同類而感召也治熱則恐亡陽治寒則恐亡陰最難為矣陰虛只當發熱不當惡寒然亦有惡寒者熱勝反兼勝已之化也氣虛只當惡寒不當發熱然亦有發熱者火與元氣不兩立也小便黃赤多主於熱經又云肺氣虛則肓肩背痛寒少氣不足以息溺色又冬脈不及令人眇清脊痛溺色變二者言肺腎虛寒而小變何虛實寒熱相懸而其病則同若此要知肺虛則不能通調水道腎虛則關門不利皆能而為熱熱則溺色變是熱則一第有虛實之不同耳亦不可不知從治之法也按便赤變有中寒而如是虛人老恆變熱則一未應説定必伏其所主而先其所因丹毒之與發斑亦有表裡致病之殊丹毒則系感觸時行不正之氣滯於營衛斑則由陽瘀熱而發於肌肉耳二者雖宜清熱在丹毒不可不加以解散在斑又不可不顧其虛蓋斑亦有亡陽於外者如丹溪所治完顏小將軍是也隨出隨沒系陰虛而虛火遊行者又身癢癮疹有因風濕及痰者風傷衛衛傷則不能固衛津液故令自汗此説深得用桂枝湯之旨表之前則裡虛此一語人往往潦草看過而不求其所以然蓋營衛受氣於胸中而臟腑亦受輸於營衛受邪而實則失其轉輸之職而里為之虛亦醫道之淺而易忽者按營衛受邪而實漢言衛受邪而實則營失其衛而里為之虛不然表實裡虛一語終欠明耳病有大相懸殊而其理則同者如肺痿之避肺之與病不同然一本與陰虛一本與陽實其理則同故學者不可不知此類人身中三陽經衛於外三陰經守於中原無勝負第陽氣喜舒而惡則熱生七情六淫皆能令也又天産作陽厚味助火又勞倦則陽和之氣動亂為火如是則火與熱搏擊於身形之中未免傷陰陰傷則陽旺陽旺則陰愈傷以至偏勝偏虛故丹溪發陽有餘陰不足之論世人讀其言不精求其義毋怪其有吠聲太陰厥陰無熱而少陰反有熱者緣少陰與太陽為表裡其經亦裡之表又少陰茂真陽斯二者俱是反有熱之故也觀其用麻黃附子細辛湯概可見矣胃偏於陽則消穀易飢又曰邪熱不殺穀是胃陽發露不殺穀是邪熱耳傷寒論金匱要略豈每證治驗然後筆之於書哉不過以正氣與邪氣相擊在何經又系何邪見證應作何等立例論其理耳然卻非杜撰後人亦此等理明白於胸中何難因此及彼昔腎議論真筌諦也又要略者是舉其要而言擴而充之存乎其人燥極而口噤善驚數欠者以木被金囚而不舒也婦人藏燥喜悲傷亦是此意寒之而熱者取之陰熱之而寒者取之陽各求其屬當天地不交之時陽獨治於上無陰以蓋覆之陰猁治於下九核原明者當於陽樂中加以收斂降下之品使陽歸於陰樂中加以升勝發之味使陰加於陽過用陰精而陰脫於下暴喜傷而陽脫於上則各補其陰陽其有亡陰而陽脫於上亡陽而陰脫於下則脫陰者當補其陽脫陽者當補其陰陰虛陰亢法當益水或加細生甘草以瀉火此先天之陰陽也陰虛而生濕熱法當滋陰以瀉濕熱如六味丸加黃柏知母此後天之陰陽也陰虛陽無所附法當峻補其陰以攝伏其陽虛而陰無所倚法當峻補其陽以承領其陰陰陽兩虛則平補而各居其位此後天之陰陽而並通乎先天之陰陽也相火有二在少陰者元陽也在少陽者生髮之氣也皆須陰以養之咳嗽大半是火來剋金謂之賊邪故難愈在實火固可瀉若虛火惟有壯水之主然壯水之主豈常人之能事又豈可以歲月程功況乎陰虛於下則痰氣雍於上養陰之藥又皆陰氣留痰亦未有倉卒取效也按此是內傷陰虛火來剋金之嗽若風寒外入肺邪未出失解者久之火亦剋金傳談生痰又在體認明白人有至冬寒時苦足冷夜半陽氣漸生其冷愈甚此亦質壯秋冬奪於所用病之輕者也其人上焦必多熱蓋兩腎陰陽抱負損一分之陰即脫出一分之陽既強力入房奪其收藏之用陰精從未全虧陽氣亦難全藏是以上焦每多客熱下焦每多客寒至秋冬三陰氣多三陽氣少之時足為之冷矣書當陽氣旺或能入於陽子後初生之陽其氣尚微遂不能入於陰而足愈冷也比之夏至一陰生而天氣反熱冬至一陽生而天氣反寒其理一也矧脫出之陽與上焦初生之陽至此時兩陽搏擊於胸中未免痰氣溷滯此又陽不能入於陰之一義也內經寒厥寒厥論云春夏則陽氣多而陰氣少秋冬則陰氣盛而陽氣衰此人者質壯秋冬奪於所用下氣上爭不能復精氣溢下邪氣因從而上也人和在秋冬奪於所用謂秋冬奪於收藏之用但不知收藏何物豈知收藏者指此陽氣而言也陽氣至此時收藏腎中正當思培養之計為來歲生長之用奈何恃其質壯而以入房遂奪此收藏之用於是下焦之陽衰矣衰則求救於上焦之陽上焦之陽原賴於下焦之陽為之根今下焦潛藏之陽既衰而上焦之陽安能復也陽不能持其陰精而精氣溢下上下之陽俱虛時令之寒挾下焦之寒從之而上故寒厥耳後人謂奪於所用是精竭於下上爭而求救於母氣腎所去者太過肺所生者不及故不能復如此言則是陰虛之證不當見為寒厥與陽氣衰於下則為寒厥與陽氣衰則不能滲營其經絡之旨大相背戾此蓋隨文順釋弊後學無可適從耳腎虛水泛為痰謂腎中陽虛也陽虛故水泛溢若陰虛則是有升無降咳唾痰涎二者相去徑庭治法迥別火之所以沉伏者多本於陰虛無以堵御經謂陰脈不足陽往乘之也故養得一分之陰即能托出一分之火如瘧疾邪微正復將欲愈口舌反生瘡又傷寒口渴為欲愈是矣丹溪陰不足之論誠為精確是則當養陰矣然道家又言純陽又是喜陽而惡陰不知陰陽不可偏勝亦不可偏負其相得無間便是真氣真氣即生氣也人生動作不衰皆賴此陽氣然養此陽氣又全賴此陰氣如魚之有水所以陰在內陽之守也然陰氣匱乏一分則陽氣脫出一分陰氣全絶則孤陽飛越而去矣善攝生者外邪不侵內情不動茹淡遠則火不作而陰全陰全則陽氣相抱四肢百骸皆陽氣充乎其間故曰純陽苟不知此理而一味養陽以求生經曰有陽無陰謂之厥陽可生乎瘧瘧瘧之寒熱當知三者之別一因有形之積留於中焦夫中焦之氣主行營衛者也為有形所陰則營衛不能受氣而虛衛虛則惡寒營虛則發熱也再則因暑邪陰寒所束在表半里之間一日發動薄陰則陰實而陽虛薄陽則陽實而陽虛陰虛則發熱陽虛則惡寒也其三因氣血兩虛氣虛則惡寒血虛則發熱也凡病見寒熱不越此三者按氣血虛惡寒發熱説在瘧之寒熱條下宜細心分別氣不足則中焦之氣斷續而不行凝結而為脹滿痞塞血不足則不能吸陽氣於下中焦之氣亦斷續不行凝結而為脹滿痞寒於此但當診其脈證察陰虛陽虛而補益之一切破氣消導之藥不可用也夫四肢百骸皆受氣於胸中氣血虛則周身浮腫亦如中焦之氣斷續不行留結而為脹滿痞塞也於此亦當審其氣虛血虛而補益之浮腫自消一切消腫利水之藥不可用也明知逆順正行無間嘔衄血不止有當下之者人皆知血出下核為順故其法應施於妄逆之際也不知血之妄逆皆因於火治火必用苦寒苦寒之藥能令血凝而不流血不流則氣逆嘔逆豈能止乎縱使得藥而止瘀血之患作矣所以用苦寒下之俾火降而瘀血不留斯一舉而兩得也按嘔衄用苦寒下之是逐瘀血也然不苦慎用苦寒無使血瘀不愈於下之乎推本陰陽表之陽附於津液大汗亡津液故曰亡陽里之陽附於腎水房勞損陰精故曰脫陽不然津液與精皆陰類何以陽名溫瘧風溫悉是冬不藏精之人其寒直中少陰至春因溫而發病雖有輕重之不同而致病之由則一也內經仲景未詳其治而但有其論後人因其論而倣佛其治總不外甘寒以救腎辛涼以祛溫獨不思腎虛者腎中之元陰元陽虛也此法施之於陰虛之人則可施之於陽虛之人其可乎人但知冬不藏精謂陰虛也不思陰既虛矣陽豈能安其位乎況兩腎中一點真陽命曰守邪之神風寒直中少陰多由神不能守此等又可以前法治乎安得起仲景於九原而細商至當不易之理也老人陰者十常八九陽虛者百無一二天地古今之理亦然試觀古人敦厚和平陰之體也今人尖鋭躁急陽之體也世道漸漓亦指此敦厚和平之陰氣漸漓耳審此則古方治今病端有不可執者至論進陽退陰進君子退小人若易之喜復而惡剝此陽蓋指生髮之氣陰指肅殺之氣又非謂人身日用消長之陰陽也按老人陰虛者固有陽虛者更多有服參耆附桂而日不容已始長年安保者則何故耶是説當論活些勿執寒熱人身中之陰陽耳治則為陰陽乖則為寒熱衛屬陽其氣栗悍故行速營屬陰其氣靜翕故行遲瘧邪之間一日及連二日發者邪之著於營也如周天之數日行過之月行不及亦是陰陽遲速之分耳生我者非他五運之氣也死我者非他亦五運之氣也故有五臟即具五行及邪之所湊或真氣本虛或他臟薄乘則各呈其象而為病以脈言之如真臟脈見即與之決死期燒針益陽損陰今時陰氣漸漓盡從火化燒針一法多不效匪無其傳也時世異也即岐伯生於今之時亦當舍燒針而從事湯液矣治病有失之漸者見病治病是也有失之深者誅伐無過是也推本陰陽萬舉萬當按陰陽本乎日月循環以陽主動陰主靜合五運之氣化包合五行之盛衰生剋制化各呈其象分布五臟應乎世運可以明虛實辨表裡別營衛以參周天之數日月盈虛消長之理皆在其中矣脫陽遺精永樂戊子夏郁文質遘遺精之疾形體羸兼以痰喘交作日夕不能體息遍召市醫治之轉劇後乞余診之視告其致病之由陽脫也幸及治之緩則死矣非大料重劑則不能寮於是用附子天雄為君佐以人參於朮雲苓日加數服夜則減半自秋租冬所服附子約百餘雙餘藥不計厥疾乃瘳按真陽離根勢已危急故進大劑陽書夜頻食方獲挽回元陽於將離之際然非真知灼見豈能立起沉疴所以名醫異於庸俗者哉國朝醫學今世之業醫者挾技以診寮者則有之矣求其從師以講習者何鮮也我太祖內設太醫院外設府州縣醫而學為為名蓋欲聚其人以教學即成功試之然後授以一方衛生之任由是進之以寫國醫其嘉惠天下生民也至矣某嘗考考成周所以謂之醫師國朝所立為醫學之故精擇使判以上官聚天下習醫者俾其之養之讀軒岐之書研張系之技試之通而後授之職因其長而專其業績其事以制其祿則天下之人皆無夭閼之患而躋仁壽之域矣是亦王者仁政之一端也承三世何其惑歟噫古之豪傑自振者不能悉舉若李東垣朱丹溪滑伯仁戴原禮輩皆非世傳而精造醫術屢起危殆著書立言為後進模範初不聞其父子相傳也是如醫在讀書而不在於三世明矣寒因熱用熱因寒用當聞封門仰同知璇性嗜方書凡遇家人有病自聞治其姊六月間勞倦中暑自用六和湯香藿飲之類反加虛火上升面赤身熱後邀劉宗序診視六脈疾數三部豁大而無力劉曰此病先因中氣不足內傷瓜果生物致內虛發熱非六和香藿所能治療況夏月伏陰在內重寒相合此為陰盛隔陽之症急用補中益氣湯加附子三錢煨乾薑一錢同煎置冰中浸冷服之其夜得熱寐至天明微汗愈仰拜謝曰伏陰之説已領教矣但不解以藥冰之何也劉曰此即內經熱因寒用寒因熱用之義何難之有仰大歡服按此症知中氣不足者因診六脈疾數其要在三部寄豁大而無力以獲其受病之源用補中益氣湯加薑附健運中宮使脾陽旺而宿滯自消其用冰浸冷服乃用經旨亦巧思矣沖為血海甲乙經曰丈夫以右為命門左為腎女子以左為命門右為腎無求子曰男子得陰以生先生右腎女子得陽以長先生左腎是以女右手命門為子宮左手腎為血海二説不同何也張潔古云婦人皆左為腎右為命門男子主藏精者氣海也女子主擊胞者血海也所主者異受病則一也此説當為定論靈樞經曰沖為血海任主胞絡血海者衝脈也胃家濕熱近也方書惟戴元禮證治要訣議論切當有益後學但其間有云諸血藥中半夏陳皮自不可少余竊疑之半夏性燥功能去濕健脾古人發渴者尤且禁用恐其性燥捐損耗血分耳惟氣證發渴者不在此例當時元禮必因好酒之人胃氣濕熱而致吐血者用之則宜若云諸血藥中自不可少恐非元禮之言或門人誤記之耳按半夏性燥功能勝濕健脾古人發渴者所當禁用以其性燥有耗損營血之虞或謂嗜酒者胃有濕熱而用之則宜若無濕熱猶當禁之今特揭明其旨酒面傷脾吳江謝訓導病頭痛發熱惡寒初作感治或以風治見熱則退熱痛則止疼或又以氣虛治由是雜治病加劇人事不省飲食已絶家人意其必死謝曰吾病惟盛御醫未視診命子乞余診得右關脈沉而澀重按有力乃誤藥所危此病法當先去宿滯疏二陳湯加酒製川軍八錢令其子急煎頻飲之至夜分左肯漸動肝氣亦舒大瀉二次是已有可生之機矣至半夜時覺腹中腸鳴左目睜開又下積垢數升中有堅塊如雞卵者數枚以刀剖視皆濁痰裡面食也既而氣舒結散津液流通知飢索粥而遂安矣衆人奇其治互相詰問答曰謝君或人也久居於南飲酒食麵皆能助濕濕勝傷脾生痰故土一虧百病交集有是病服是藥更復奚疑衆皆服膺凡治病必先審致疾之因方土之宜也按此病因濕滯生痰里結難消兼以雜方亂投脾氣亦因傷損乏健運之權矣用二陳行滯化痰繼之以導滯下行所以一鼓而擒之共旨深蘊可法可傳富商患腹脹百藥乏效淮揚江皖諸名家治之反加胃敗嘔吐不食尩羸不支危殆極矣遂乞診於余診視其脈沉遲封鎖力右關尤甚研究其因蓋以酒色過度適當暑月嗜食冰浸瓜果貪涼太過脾陽受傷而市醫妄引諸腹脹大皆屬於熱恣用寒涼重傷胃氣是錯認病源失其本矣安能去病按脈立方遂用冷香引子合醉鄉玉悄法投劑便覺清爽熟寐數時溲溺暢行腫脹漸消食知味矣富商驚喜訊何藥之神難如此余曰吾以脈理參究時令推其右關沉而無力蓋君家道殷實酒色醉飽冰瓜沉李以意騰飛度之耳竟獲桴鼓之應乃君病當瘳藉余手而治由是病除無他術也何德之有按名醫治病必由望聞問切詳加研究然後參以經旨而立方此症重在右關沉遲無力以顯脾氣不能健運輸化水氣溢於脾經而為腫脹以溫中化濕之劑溫運脾陽是治其本矣腹脹乃膀胱氣化不行濁氣因而上入脾氣愈滯而症形焉蜘蛛治蠱象山縣鄉民有患四肢不浮腫惟腹脹大戴原禮所謂蜘蛛病是也市醫進以匯水之劑病加劇時值炎暑益氣湯治之乏應乞診於余偶閲草蜘蛛氣寒有毒能治小兒丁遂以蜘蛛一枚煎水加入五苓散料濃煎去蜘蛛與病者服一盞不逾時腹中作水雞聲反覆不能安枕腹有微痛病家疑藥有誤來寓詰問解救法隨答以不必惶恐等藥力到小溲行而病自瘳又逾二時溲溺大行數次腹脹亦消其大半遂以溫中化濕法則康健如常矣按此法雖效然須審辨虛實而用如其人病氣脹未可浪用此因蓄水而脹故有桴鼓之應亦一時巧思偶中未足為治蟲恆法也濕熱生中心腹脹如蟲有老者病腹脹或作或止百治不效市醫均辭無法奄奄待斃鄰人代求余診六脈洪大重按濡耎因時值長夏濕熱薰蒸化生蟲脹之候用檳榔椿根皮石榴皮積壓五錢長流水濃煎空心頓服一碗少頃腹大痛瀉下數次蛔蟲長尺餘遂瘳五臟之蟲形狀許叔微本事云心蟲白蛔脾中心寸白腎如寸截絲縷肝蟲如爛杏肺蟲如區蠶皆能殺人惟肺蟲居肺蝕人肺系故成瘵疾咯血嘶聲藥所不到治之為難有人説道藏諸蟲頭向下惟自動初一至初五以前頭上行故用藥者多朏以前蓋此也如療寸白用良方錫沙蕪荑檳榔者極佳五更服蟲盡下白粥將息藥用石榴根濃汁半升下散三錢丸五枚今擴充言之昔人所謂九蟲之狀一曰伏蟲長四分為諸蟲之長二蟲白蟲長一寸相生至多其母長四五丈則殺人三日肉蟲狀如爛杏令人煩滿四肺蟲其狀如蠶令人咳五曰胃蟲狀暇暮蠶令人吐逆嘔噦六曰弱蟲狀如瓜瓣令人多唾七曰赤蟲狀如生肉令人腸鳴八曰蟯蟲至微細狀如菜蟲居洞腸多為痔漏疽諸瘡無所不為九曰蛔蟲長一尺則殺人又有尸蟲與人俱生狀如馬尾或如薄盤依脾而居長三寸許大害於人然多因臟虛寒勞熱特於前哲書中裒集而揭明之按蟲之患甚大所謂肺蟲居人肺葉間食人肺系其咳嗽聲嘶咯血嘔吐谷稱癆瘵沉疴藥石難以直搗蟲穴況蟲性敏捷變幻不測試誠生民之厄也初痢忌用澀劑張仲景法痢可下者十法可溫者五法謂之下者通用承氣湯加減之溫者率用薑附湯何嘗以巴豆粟殼之劑乎谷醫見自利而渴煩躁不眠手足微冷者皆用苦劑攻之殊不知陰盛發燥欲坐井中故前哲用吳茱萸湯甚者用四逆湯經曰陽虛陰乘之謂也丹溪用吳茱萸湯治霍亂吐瀉轉筋者亦此意也近世良工不審痢之赤白症之虛實新久概用罌粟殼石榴皮之類為祕方其功但施於久痢洞泄者則宜若初起者用之閉塞積滯變生別證以致經年纍月謂之休息痢者是也世俗但知澀劑之能塞不知通劑之能塞也後之學者貴在變通不可執一而治按痢疾古謂滯下以有積滯壅於腸胃不能傳達輸世故腹痛後重六府以通為新舊之積阻滯營衛升降治宜通因通用久痢正虛始可補澀二者猶如冰炭豈可不細心分辨以誤人者哉冷酒致痢偶閲儒門事親云一人病危熱戴人往視之其人曰我別無病三年前時值炎暑出村野有以煮酒饋余者適村落無湯器冷飲數升便覺左肋下悶漸作痛結硬如石至今不化代灸磨藥殊無寸效戴人診其兩手脈俱沉實而有力先以獨聖散吐之一湧二二升氣味如酒其痛即止後服和脾安胃之劑而愈始知冷酒之致病也如此按冷酒入腹氣血為之水伏遏而不宣遂成結痛痼疾或謂丹溪之論但知熱酒之為害而不知冷酒之害尤甚也古人之言物性均從試驗中而得之豈欺我者奈後人不知衛生動輒以酒為漿是自戕其身哉
