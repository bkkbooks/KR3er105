body:
  text: 卷上治病必求其本脾喜燥傷於寒濕則不能消磨水穀宜朮附以溫燥之然脾陰不足而谷亦不化又不可以溫燥為治有思慮傷脾脾虛不能統血而失出者有思慮傷脾脾虛不能消穀而作瀉者此皆以回護中氣為本勿治其標有肺虛不能衛血血溢妄行隨氣出於鼻為衄如動氣在右汗之令衄是也脾虛不能行津於三陰胃虛不能行液於三陽氣日以衰脈道不利其血悉從中積此而欲消其留瘀當以參耆監之如胎已數月忽動不止有症痼害者當下其症而胎自安設不知此僅知養血是為癥瘕樹幟養癰為患乎意戊子冬奉上命往視東宮妃張氏經閉十月腹脹如鼓動衆醫皆以養血安胎治病加劇豫診脈沉澀玄緊無生氣直斷為蓄血腹脹疏桃仁承氣湯合抵當法方進東宮怒甚羈鎖禁中數日疾益劇命余從細復診脈仍如前疏前方進並奏明再三日臣不敢疏方逾二日賞賚多珍蓋妃服藥下瘀塊數斗脹消腹平逐釋罪而褒榮豫萬幸也今特記之按疑胎而下症疏用峻劑非詳細分辨不能確有把握惟盛氏兩疏峻下是真知病源而不惑若是者不愧御醫一代之良工也火氣逆上是肝腎之陰失其龍雷蟄伏之性而上逆者至於胃中濕熱下流又是邪氣乘其本而陰氣反走於上俾上焦之陽不伸而肺中治節之令不行故見為鼻塞胸滿涎溢惡寒戰栗之證又咳嗽煩冤是腎氣之逆也其所以上逆之故亦有此二者虛實之異推此則治痰必先降火之法亦須識此二者虛實之異也又平脈法云少陰脈不至腎氣微少精血奔氣迫促站入胸膈夫少陰脈不至是先天元陰元陽受傷腎者先天也脾胃者後天也先天既已受傷則不能生乎後天故脾胃之陰陽亦傷不能運化水穀而生濕熱濕熱下流則膀胱之氣不行濁氣因而上入濁氣上入肺氣便應脾氣愈滯於是為痰為飲而腹脹食為濁陰所乘則為心悸怔忡是腎之一臟病而五臟六腑皆為之不寧故養身莫妙於節欲也若不知此而但以行痰利氣為治則燥痰傷其陰利氣傷其陽不坐困乎此又專主腎虛而言也心腎不足小便渾濁中氣不足溲便為之變金衰則水涸溺色變為黃赤此皆正氣虛而生邪熱當推原共本而補之苟徒執水液渾濁皆屬於火一語而施治病安能愈飲食勞倦損傷脾胃始受熱中末傳寒中要知始受之熱因穀氣不得升舉擁而為熱又火與元氣不兩立之熱非實熱也故在始受之時已云勞者溫之損者溫之矣病之矣病之安得不為寒中耶東垣衛任之火傳之火傳之督脈挾太陽寒氣逆丙火似失之鑿子母情牽仇讎肆虐或勝克乘薄之不一又本臟脈其別者或走他臟他脈一臟病往往挾他臟而見證者邪之所湊其氣必虛邪乘虛而人是虛為本邪為標故去邪不可不加以以養正此一注腳人所同也然亦有身體壯盛之人暴受邪氣如外感風寒內傷飲食之類本氣未必皆虛受病之後反顯虛象若營衛受邪則屈伸不利動作衰乏脾胃受邪則四肢無力惡食嘔混之類此邪氣既湊之後其氣必虛是虛因邪而顯邪為本虛為標斯時但當急去其邪而正自復不必顧慮其虛用藥牽制此一注腳余所獨也治病當知標本矣然猶不可不知標中之標本中之本如脾胃虛而生濕熱是虛為本濕熱為標也至濕熱下流膀胱之氣化不利是濕熱為標氣不利為標中之標至氣化不利逆而上行嗌塞喘逆又標中標之標也推此而逆求之則本中之本亦可得矣陽旺生陰氣不足亦令人口乾而津液不通喘而短氣須別寒熱虛實分類治之至於哮則素受害痰火為風寒所束而發但看其人之強弱用藥輕重可耳肺本金寒水冷之臟然既已汗吐下損其津液而成肺痿矣豈清涼之品所能復其津液乎此仲景之竟用桂枝人參薑棗所宜詳究也火與痰本氣與津液也無病則為氣與津液有病則為火為痰然致病之由不過內傷外感有餘不足求其本而治之則痰消火滅故曰見痰莫治痰見熱莫治熱者以此內傷外感悉能致勞苟不察其虛實但施養陰清熱之套劑則虛者未必受補南昌實者愈實矣失血證畢竟熱者多世有用寒涼而反劇者蓋有氣虛之火有血虛之火耳衛氣上逆有上焦之陽不足而陰氣上乾者有下焦之陰不足而陰火上逆者有脾胃之濕熱下流而肝腎之氣不能固守於下者俱挾衝脈故耳邪火內熾陽事反痿苦寒瀉之陽事勃然火與真陽勢不兩立如此世人以助火之劑冀回真非徒無益而又害之所謂虛風者似風非風也然亦有陰陽之別陰虛是熱則生風陽虛是陽氣不前衛外衛為陽陽虛不能衛外故中風風為陽邪以類相召故也但飈陽邪既中之後每多顯陽熱之症此不可不推求其受病之本而務從事於見病之標也諸病皆治其本唯中滿與大小便不利當沼其標以證之危急不暇為本計也余謂系實證則不難消導之通利之治其標可也若涉虛證其法可行乎仍當治其本東方常實有瀉無補譾二一者肝為將軍之官其性剛徑急速一者木火同居風乘風乘火勢火助風威皆毋贊其勝也若言其本則乙癸同源養血與滋陰並急癲狂癇皆主於痰癲是虛而致痰狂是實而致痰癇是風而致痰虛實風為本痰皆為標也痰在肺曰燥痰又曰氣痰以肺金為燥而主氣也燥為本氣為標其痰澀而難出見為證也往往胸膈阻塞關節不利不知者以辛香燥熱利其氣燥者益燥氣愈不利肺虛咳者何也失共降下之令也從降基氣咳愈頻矣黃昏咳多者是火故宜五味子而降之諸痿喘嘔皆屬於上上者肺也不得以香燥利氣濕勝則濡泄當以燥劑治之然逆秋氣則傷肺冬為食泄此肺移熱於大腸之病若以溫燥治之是益其病也渴固多熱然內外傷感內外傷感悉能令津液不得而渴須求其自三陰結是水之本至肺氣不利發為浮腫喘嗽口乾小便澀腹滿黃汗身重不能轉側陰腫陰濕則又水之標也寒邪在表鬱熱於經而令咳血衄血解表自愈麻黃杏子湯是也心肺有疾而鼻為之不利不必專主於風寒也治病必求其本本者下為本內為本故上熱下寒但溫其而熱自降表寒裡熱但清其熱而寒自已然須加以反佐之藥以免格拒至於先傷於風而後傷於寒先傷暑而後傷於濕之類又當相其輕重緩急而施治有者求之無者求之盛者責之四肢無力動作衰乏虛也然邪客營衛則出入之道廢中焦有陰則升降之機窮亦能見證如此故曰無者求之諸痛無補言氣逆滯也雖然壯者氣則愈怯者著而成病真氣虛乏之人諸邪易於留著著則逆逆則痛刷之中不可無補養之品徒恃攻擊則正愈虛不能送邪外出邪愈著而痛無休止也遇斯疾者攻補兼施而不愈遂宜屏棄一世其要又在斷厚味遠房幃使邪無所助而正氣日勝然後佐以悚刷擊其惰歸病無孔不愈但邪氣方熾病者正在呻吟痛苦之時醫者教之以如此如此是猶子興氏教滕君以強為善鮮不以為迂闊而遠於事情者也又若脾胃亡液焦燥如割宜用真生脈陽澀陰弦而腹中急痛當用小建中湯肝氣不足兩脅下滿筋急不太息四肢厥冷發嗆心腹痛目不明瞭爪甲枯口面青宜補肝湯房勞過度腎虛羸怯之人胸膈間多隱痛此腎虛不能約氣虛不能生血之故氣血俱虛則凝滯而作痛宜用破故紙之類溫腎芎歸之類養血又胸痹痛有真陰虛而然者有元陽虛地氣上干而然者頭痛有氣虛者有血虛者有腎虛者皆不可以無補也芐地黃也婦人因産去血過多腹中急痛是肝木無血以養宜當歸建中湯亦是痛而應補者婦人居經血弱氣盛孤陽獨呼陰不能吸陰為績寒陽為聚熱故時發灑淅咽燥汗出或溲稠數多唾涎沫其脈右浮大左弱澀此當養血所見之證忽計也證象白虎誤服白虎湯必死言治假以真也寒邪閉共營衛當以升發之藥散之然素有痰熱之人遇此升發之藥痰隨氣上閉住肺氣皮毛為之擁遏邪愈不得泄病反增劇又當以苦泄之心火不得越則鬱於小腸肺氣不得泄則鬱於大腸小腸下口既大腸上口故奔迫無度裡急後重而成滯下此是風寒內縮然徒責之濕熱未能萬舉萬當所以治痢亦當與治疲半表半裡同法食績痰留舍腸胃之間氣行則出有似魚腦間以血系閉氣滑腸狀如痢如痢痢反快不可作痢疾治也熱則生風痿痹不隨而有風象醫以風治之恐不免致痿也便泄肛門熱有火熱有陽陷二端先天者無形之虛神而已矣後天者有形之實則氣血也治先天當以神治神治後天當以形益形也但神虛則氣血不生神亂則氣血不安氣血虛則神無以養氣血亂則神為之造遷此又當消息之耳按氣血即神之窟宅不治氣血何由治神以神治神立論如此尚須著落耳吾常謂談醫之道不可一語模糊令人徒作天傺真人想也天地陰陽停勻方不崩不圻人亦如之稟畀之後嗜欲不節起居無時七情六淫所傷致此陰陽有所偏損偏損則偏勝故見以為有餘而實非有餘但治其偏損者而有餘自平形氣有餘病氣有餘瀉之可也形氣不足補之可也至若形氣有餘病氣不足形氣不足病氣有餘當責有無真假東垣云但補瀉病氣之有餘不足必顧其形之有餘不足似非確論幼科大便黃赤屬熱是矣其青白亦未可專以為寒夫水穀入胃大小腸腸胃無邪則水穀以次傳化清者入營衛化精微濁者下廣腸成糟粕糞為之變設腸胃有寒水穀不得熟腐故下利清白完穀未盡化不得專以為寒也腎為先天之本脾為後天之本固矣然肺金不足或不得其平亦不能生土徒責之脾腎無益故病亦有治標而得者百病不離乎火火者天地所有之氣亦吾身所有之氣也從外入者天地亢害之氣吾身中以類相感召亦令此氣為之亢害也此傷暑受熱是矣自若七情以及風寒燥濕動亂為火者以火喜條達而惡遏抑今以七情及風寒燥濕遏抑之故動亂而為害然發之瀉之制之克之可也逮夫相火則其體藏於右腎之中所配左尺之水俾此水得以切於上下周於四表充膚澤毛若霧露之溉雖水為之實火為之也設使陰虛此次失其窟宅遊行於四肢百骸五臟六腑之間而為大患陽虛則此火無根而脫出為患亦然此不可以濕折水滅唯當相其人之陰虛陽虛而補養之獨是體虛之人易於受邪或內外傷感抑遏成火則補虛之中不可無瀉實之樂若六味地黃丸黃柏知母等方是也審此則用藥不難中肯啓矣按相火稟命於命門真水先天水火原屬同宮水以火為主火以水為原下論曰設使陰虛此火失其窟宅陰虛即水虧火脫豈六味加知柏可平之者耶諸瘡將結痂時必極癢蓋癢為虛先時邪盛則痛今邪去則虛虛則癢邪去則痂若癰症初發便癢是邪盛正虛也上有絶陽之絡下有破陰之紐皆是氣虛不能緝續故也補之所以緝續之耳但正氣一虛火便盛又穀氣不得升舉而為熱又氣虛不續而有留氣為喘滿為痛往往見有餘之證令人畏首畏尾不敢徑行施補遷延就斃者有之肺出氣腎納氣所謂一呼天根一吸地穴循環無端應刻而不疾徐者也此氣一虛則斷而不續或短氣不足以息或擁而為滿雖雲氣不歸元其實只是氣虛也若陰虛陽無所附上見喘滿此則真是氣不歸元耳言而微終日乃復言者此奪氣也濕家短氣聲如從擁中出此氣為濕所持而然然則有形之傷悉能令氣短不得定奪氣也腳腫無非濕熱蓋濁邪下先受之也膏粱厚味之人由濕熱下流田野耕鑿之人由寒濕外侵是為之産邪中氣素餒土虛不能制濕之人是為虛邪二者雖有虛之前之不同然皆本於濕唯是一種形瘦多熱老折陰虛者每至日午腳面浮腫此何以故豫嘗思之陰虛而至暮年陰愈虛極之陰便不能吸氣歸元而升舉其陰於是陽獨浮於上陰獨沉於下而腳至暮浮腫也汗多亡陽下多亡陰言陽主外陰主內也然豈無辛熱而損蓋復之陰豈無苦寒而傷閉蟄之陽必同見證何等而參之以脈方為不誤按汗多亡衛外之陽下多亡主內之陰二者應之速汗不過一汗再汗下不治風熱燥火寒潤之中尤必以真陰為先務治寒濕溫燥之中尤必以真陽為先務然風熱燥火亦有亡陽者陰虛陽無所附也寒濕亦有亡陰者陽虛陰必厚味之人不妨消導然情欲過度又宜慎之藜藿之人最忌消導然淡食形盛又在不禁凡病煩躁而愈者以邪氣盛時正不能與之爭反相安於無事及其正復而與邪爭故煩躁也以此知癱瘓不隨之證無痛癢者反難療以正為邪並而不能復耳病有在下者其見證反在上蓄血發狂是矣在上者其見證反在下肺氣擁大便頻肺虛小便數是矣在裡者其見證反在表如熱深厥亦深及面反戴陽是矣風溫溫虐得之冬中於風寒遇溫而發其氣自內達外故多汗不比風寒束閉其營衛當鬚髮汗解肌也故以發汗為逆然其邪自內出若因汗而驟加表之藥邪不得越為害匪輕務必相其人之虛實清解得宜虛不受補邪之前也實不受攻正虛也氣有餘便是火氣焉能有餘惟是少一分之陰便多一分之氣此一分之氣無所歸宿而為火矣按血陰氣陽二者屬人未見其有餘少一分陽便多一分火火有餘則似氣有餘也如此説方透陰陽有偏勝為病者有偏負為病者然偏勝之中往往有偏負之假象補之則益勝偏負之中往往有偏勝之假象瀉之則益負清氣不升濁氣不降七情六淫氣血飲食痰皆能為之苟不求其本而但利其氣氣之升降得乎疾無汗要有汗固矣至於有汗要無汗此亦不可斟酌也雖邪有虛之不同熱則腠理開又暑為陽邪陽邪多汗故癌症往往多汗數發之後邪氣漸衰者亦以邪從汗解所以疾雖衆不救者少亦此故也豈可因其多汗而遂加以固表之藥邪無從解矣故古人但言扶正為主亦未嘗言固表也余謂汗少不妨更汗若汗多不必更發汗似為得之醫家要明不可治之病而後知有可治之病不可治之病真陰元陽虛極故耳如形盛脈細少氣不足以息者死形瘦脈大胸中多氣者死世人從讀其文而不繹其義豈知形盛脈細元陽虛也少氣不足以息虛之極也故死形瘦脈大真陰虛也胸中多氣虛之極也亦死又如溫病穰穰大熱脈反靜者死下利脈反大者死又皆正氣虛而邪氣實也正不勝邪故死可見凡病之不可治者由真陰元陽之虛則其可治者可意會也邪之所湊其氣必虛故曰不能治其虛焉問其餘然亦不可執也豈無壯年之人達年之和遇月之虛豚思慮應酬之間為虛邪賊風所乘又因脾氣健旺過啖甘肥炙煿釀成膠痰實火則發表攻裡如河間之推陳致新有何不可若因顧忌則反纍正氣所謂五虛死五實亦死又云毋虛虛今又不論虛實動手便用實補益自謂調元之手亦膠柱而鼓者耳庸工但執熱則流通寒則凝滯二語一遇諸腹脹大痰氣阻滯與夫大小便祕遂行溫利之藥不知寒熱虛實是病皆有如諸腹脹大皆屬於熱類心曰熱痰氣有餘便是火熱則燥澀為癃此等可溫利乎夫水下二刻一周盾環此陰陽禁止抱之氣而然偏陰偏陽能之乎故曰氣化則出其旨深矣手足心熱及夜有虛有實不得執之下陰虛鬼賊相刑固為惡候然於理為順微邪薄所不勝由已之虛也於理為逆所以病亦有微邪而篤者賊而愈者活血陳者不去新者不生始由虛而致實終因實而致虛此攻擊之品不能無也肝欲散急食辛以散之肝實也肝苦急急食甘以緩之肝之虛也推之他臟亦然女人血結胞門則上焦之陽不得入於陰在下則小腹裡急五液時下在上則孤陽獨浮而為發熱為掌上煩為唇口乾燥又宜先開痹破陰結引陽下行不徒專事滋陰小便少亦有肺熱不能通調水道者風溼症以去蒼朮加白朮沖和湯為當風寒症亦有風有時開其腠理而自汗者四時傷風亦有自汗者耆芍宜慎風火皆陽能開其腠理皆自多汗一則桂枝一則白虎不可紊也廉泉開有中熱者有中風舌縱者虛則不能運化精微而為熱此陰黃之由緊徑縮燥之體也風勝反似之兼勝反似兼勝己之化也營衛受氣於中中有所阻則營虛發熱衛虛惡寒故氣血飲食痰皆能為寒熱者此青筋證面青唇黑手足厥冷氣逆血沖使然醫者意中不先有此一證鮮不認作陰經傷寒也按即今之急痧北方名為青筋症膈問有熱痰熱氣上蒸脈道擁塞故令人頭風目昏治以酒蒸大黃自上抑之所謂鳥集高巔射而落之此症甚多眼科庸工未達至理反用寒涼冰復遂至目生醫久則盲按豫治目疾初起必先用疏散活血二三服即愈從無失明醫障之患是歷驗心得今特揭出啓迪後進足徵啓東先生學有根柢非無據之言也人身中有形之物皆屬陰故曰瘦人血虛然肥人有痰生熱熱生風風生燥燥則傷陰往往亦有陰虛者不可不知痰之洶湧上焦結聚胸中皆由於氣治氣又莫先於降火破氣清火則痰自消此則言乎六淫七情拂暴積之痰耳若日積月纍老痰凝結又當積漸以消釋之更當相其人之陽虛陰虛助以調補苟如前法將見痰未降而氣已消為患不或勝言矣醫者曉得當汗而汗當下而不難曉得當汗而不能汗當下而不下為難仲景之可與不可宜詳玩富貴之人恣情縱自揣不足求補於味知腎虛則胃弱不能消磨其厚味不生津液而反為痰涎中州不運矣氣愈弱矣病者不察虛中有實醫者又不識實中有虛攻之不安補之無益聊藉參耆苟延一月一旦奄逝自謂其命安不悲哉按之痛者為之前不痛者為虛夫按則氣散即之産亦有因之而痛減者虛氣擁而為痛覆按之氣愈擁即虛亦因之而益痛者正未可執此而定其虛實也若以熱手久按痛止為寒不止為熱此則差可必耳七情所傷動亂其火而傷陰此易知也七情所傷動亂其神而損氣此難知也要知神乃氣之帥神亂則氣自損耳疏其氣血令其調達而致和平高粱厚味之人形盛氣衰以氣不足以充故也然氣不足則生痰以為氣不足而補之則痰氣愈滯胸膈不利營衛不通加以以腎元衰耗厥氣上逆諸病生故善治者補益之中不可不兼之伐痰然端本澄源又在遠房幃斷厚味為先務也五臟各有專司六腑互為輸瀉不啻百僚師師矣十二經以行於表裡上下十五絡以絡之奇經八脈以藩蔽之不啻金城湯池矣然主不明則十二官危土崩瓦解之勢一朝而至可見善養生者全在收攝此心程子曰心要在腔子里朱子曰必使道心嘗為一身之主而人心每聽命焉則天地萬物且位育豈但區區卻病而已按人身別有一主非心也謂之君主之官當與十二官平等不得獨尊心之官為主若以心之官為主則下文主不明則十二官凶當云十一官矣此趙無問所見超也陰虛則陽無所附氣有升無降法當以滋陰藥為君降之藥為佐苟徒降其氣則清未必升而濁且隨干矣此治陰陽偏虛不易之理外此或七情逆滯或氣血飲食痰阻礙中焦妨其升降出人之路其人元氣未虧不妨升之降之可也然以上悉指後天有形氣血而言若論先天元陰元陽則陰虛陽必薄陽虛陰必乘此時但當峻補其陰陽無暇為升降治標計也八珍湯固是陰陽平補之劑然人稟受不同豈無偏勝偏虛則知少補一分之陽不足以配陰少補一分之陰不足以配陽多補一分之陽則陰氣耗竭一分多補一分之陰則陽氣牽滯一分此調理不足之證最為棘手況乎體虛之人外淫易犯內情易起飲食易停痰血易滯尤不可僅責其所無而不求其所有也陰雖主降然必欲由天而降陽雖主升然必使從地而升方謂之陰陽相抱故用苦寒以治火之王辛溫以治水之王病未去而寒熱反增邪正相搏則痛若正不勝邪不妨補之然須佐以去邪之藥若正氣太虛又不妨純補俟其正復然後加以去邪之藥兵法云先為不可勝以等敵可勝又曰善戰者立於不敗之地而不失敵之所以敗也虛痛雖有氣血寒熱之分然皆主於氣滯不滯則痛無由生氣虛則氣行遲遲則滯而痛血虛則氣行疾疾則前氣未行而後氣又至亦令滯而痛故氣虛補氣血虛補血俾陰中有陽陽中有陰反其漏下二刻一周扦環之常痛自愈也按陰陽虛實之辨明且晰矣醫道精蘊猶兵家之善戰必先明地勢可進可退自立於不敗之地而已
