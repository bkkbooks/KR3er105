front:
  text: 重校訂序今之郡國絶鮮赫然高醫者何與夫亦由守習先術者亦無化裁從任胸腹者肆意治療苛且刻之功授劑需銖錙之財邦麼禁條十全道妝況夫醫者聖智之長神明之業也古以濟世今以豐家古以名重今以利先無怪乎倉扁鮮渺也盛氏啓東少窮素難博研群測古酌今表奇微謬筆以記之非知醫之深者不能與此噫若啓東者不愧一代御醫之良工而光軒岐之學矣奈書未刊布輾轉鈔繕亥魯魚不計其數隨讀隨校待付手民而免淪之憾焉嘉善後學高杲識
  hash: sha256:84782b90ddb03b3196495a40063e534b72cec2825dcbf053a976783f00fd4391
  markers:
  - {type: 'tls:head', offset: 0, content: '', id: KR3er105_jc_000-d2.h1s1}
body:
  text: 再訂題辭一介士敬存心濟物必有所濟雖蓬纍而行與時則賀者不可同日而語而其志則足尚矣今讀盛氏筆記發揮經旨明若燃遲蓋早年隱居洞庭湖之濱喜讀賁典洞達通塞基才如五石之瓠不適於用然濟人利物之心未嘗稍懈逐膺闢而春滿兩都名溢宇宙乃績學日深有以致之者余應京兆試過同年偶一見之如獲鴻寶假録一通朝夕研究折衷諸家參以已意將疑似難明之旨提要鉤元隨讀隨按闡其未盡之意以啓後進之悟苟能討奧蘊真古今一貫之理實醫林罕見之書引而伸之平時得之於心臨證應之於手裨益蒼生殊非淺甚也時道光丙仲秋上浣重評校祕旨藏事日也曉瀾書後緒原醫以寒治熱以熱治寒以消導治績以快樂泄滿補治虛羸以澀固脫以利下攻祕以潤治渴以辛溫散表以香燥理氣以寒涼止血以通止痛以養血治不得眠以補兼滑治脈遲澀以清且治脈洪大以下氣清火治上逆以利水通淋治水泛濫以涼表治發熱雖在下愚不難措手惟是以寒治寒如諸寒鼓如喪神守皆屬於火是也以熱治熱如發表不遠熱是也以補治績所謂養正績自除是也以益氣治滿所謂滿用術甘是也以下治利所謂通因通用是也以提氣治閉如小便不利用補中益氣是也以混水治渴如五苓散治消渴是也以寒散表如四時感冒怫熱自內而達於外藥用苦寒酸寒是也以涼平理氣丹溪所謂氣有餘便是火是也以溫補止血如黃土湯桃花湯是也以攻擊治不得眠如胃不和則臥不安又痰在膽經神不歸舍是也以利下治遲澀之脈如脈遲而滑有宿食又脈澀不減為中焦實是也以補中治洪大之脈如內傷用補中益氣湯是也以溫中治嘔逆如吳茱萸湯大半夏湯是也以固表和營治水如水在皮中四肢聶聶動防已茯苓湯是也以實表出汗治太陽中風如桂枝湯是也以攻下及補益治發熱如表無熱而裹有熱是也如此之類苟條分縷析何可殫述雖在上智亦費推求前哲非不切切著明奈後人動手便錯者良由但知治法之所當然而不知治法之所以然也不揣略特將平日經驗歷試不爽者闡明疑似之理提綱挈領本之經文節其要旨參以管窺所得隨筆記録俾後進者有所指歸屬類旁通所謂比類奇恆或在於斯時永樂十有六年暮春上浣姑蘇啓東識
